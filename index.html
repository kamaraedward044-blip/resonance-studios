<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Resonance Studios</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #0f1720;
  color: #fff;
}

/* HERO SECTION */
.hero {
  height: 100vh;
  background: linear-gradient(
      135deg,
      rgba(13, 27, 42, 0.6),
      rgba(42, 90, 127, 0.4)
    ),
    url("images/hero-image.jpg");
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

.hero h1 {
  font-size: 3rem;
  letter-spacing: 2px;
}

.hero p {
  margin-top: 10px;
  font-size: 1.2rem;
  opacity: 0.9;
}

/* SECTION */
section {
  padding: 60px 20px;
}

.section-title {
  font-size: 1.8rem;
  margin-bottom: 20px;
  text-align: center;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

.card {
  position: relative;
  overflow: hidden;
  border-radius: 10px;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}

.card:hover img {
  transform: scale(1.05);
}

/* CONTACT */
.contact {
  text-align: center;
  padding: 60px 20px;
}

.contact a {
  display: inline-block;
  margin: 10px;
  padding: 10px 20px;
  background: #2a5a7f;
  color: white;
  text-decoration: none;
  border-radius: 6px;
}

</style>
</head>
