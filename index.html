<title>Resonance Studios</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1720;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: linear-gradient(
        rgba(0,0,0,0.55),
        rgba(0,0,0,0.75)
    ), url("hero-image.jpg");
    background-size: cover;
    background-position: center;
}

.hero h1 {
    font-size: 3rem;
    margin: 0;
}

.hero p {
    font-size: 1.2rem;
    margin-top: 10px;
}

/* SECTIONS */
section {
    padding: 50px 20px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
}

.grid img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
    transition: 0.3s ease;
}

.grid img:hover {
    transform: scale(1.04);
}

/* CONTACT */
.contact {
    text-align: center;
    padding: 50px 20px;
}

.contact a {
    display: inline-block;
    margin: 10px;
    padding: 10px 16px;
    background: #2a5a7f;
    color: white;
    text-decoration: none;
    border-radius: 6px;
}
</style>

</head>
